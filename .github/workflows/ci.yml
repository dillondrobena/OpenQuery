name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test-linux:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: openquery
          POSTGRES_PASSWORD: openquery
          POSTGRES_DB: openquery_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U openquery"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Enables the node-postgres executor parity suite (same assertions as PGlite).
      TEST_PG_URL: postgres://openquery:openquery@localhost:5432/openquery_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Plugin layout duplicates the skill file; the copies must never drift.
      - name: SKILL.md plugin-copy drift gate
        run: cmp SKILL.md skills/openquery/SKILL.md

  test-windows:
    # DPAPI roundtrip + POSIX-mode no-op path only run here.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
